version: "1.0"

meta:
  name: Cyberpunk Street
  technique: parametric-stylized
  description: Neon-lit urban street at night with buildings, vehicles, vendors, and dense purple fog
  author: pipeline-showcase

camera:
  position: [10, 6, 14]
  target: [0, 1, 0]
  fov: 55
  near: 0.1
  far: 300

environment:
  description: Dark cyberpunk street at night, neon signs reflecting on wet asphalt
  background: "#0a0012"
  fog:
    type: linear
    color: "#1a0030"
    near: 10
    far: 60
  ambient:
    color: "#221133"
    intensity: 0.15
  lights:
    # Moonlight from above
    - type: directional
      position: [5, 30, -10]
      target: [0, 0, 0]
      color: "#4455aa"
      intensity: 0.4
      castShadow: true
    # Neon pink
    - type: point
      position: [-4, 4, 2]
      color: "#ff1493"
      intensity: 3.0
      distance: 18
    # Neon cyan
    - type: point
      position: [3, 3.5, -1]
      color: "#00e5ff"
      intensity: 2.8
      distance: 16
    # Neon yellow
    - type: point
      position: [0, 5, 5]
      color: "#ffe100"
      intensity: 2.0
      distance: 14
    # Deep purple accent
    - type: point
      position: [-6, 2.5, -4]
      color: "#aa00ff"
      intensity: 1.5
      distance: 12

objects:
  # ── Terrain: wet asphalt road ──────────────────────
  - id: road-ground
    prompt: wet asphalt road surface, dark and reflective under neon lights
    style: stylized
    generator: parametric/terrain
    params:
      biome: desert
      segments: 32
      amplitude: 0.05
    transform:
      position: [0, 0, 0]
      scale: [20, 1, 20]
    material:
      preset: concrete-weathered
      pbr:
        roughness: 0.3
        metalness: 0.1
        color: "#1a1a20"
    receiveShadow: true
    castShadow: false

  # ── Buildings: tall towers along the street ────────
  - id: building-left
    prompt: tall cyberpunk tower with neon-lit windows
    style: stylized
    generator: parametric/building
    params:
      type: tower
      height: 12
      width: 3
      depth: 3
      floors: 4
    transform:
      position: [-7, 0, -5]
    material:
      preset: concrete-weathered
      pbr:
        color: "#2a2a35"
        roughness: 0.8
    register_prefab: true
    instances:
      - position: [-7, 0, -5]
        rotation: [0, 0, 0]
        scale: 1
      - position: [-7, 0, 0]
        rotation: [0, 10, 0]
        scale: [1, 1.3, 1]
      - position: [-7, 0, 5]
        rotation: [0, -5, 0]
        scale: [1, 0.8, 1]
      - position: [7, 0, -5]
        rotation: [0, 180, 0]
        scale: [1, 1.1, 1]
      - position: [7, 0, 0]
        rotation: [0, 175, 0]
        scale: [1, 1.5, 1]
      - position: [7, 0, 5]
        rotation: [0, 185, 0]
        scale: [1, 0.9, 1]
      - position: [-7, 0, -9]
        rotation: [0, 5, 0]
        scale: [1, 1.2, 1]
      - position: [7, 0, -9]
        rotation: [0, 190, 0]
        scale: [1, 1.4, 1]
    castShadow: true
    receiveShadow: true

  # ── Vehicle 1: Parked sedan ────────────────────────
  - id: parked-sedan
    prompt: sleek parked sedan on the street, chrome finish reflecting neon
    style: stylized
    generator: parametric/vehicle
    params:
      vehicle_type: sedan
    transform:
      position: [3, 0, 3]
      rotation: [0, 15, 0]
      scale: 1.1
    material:
      preset: chrome
      pbr:
        roughness: 0.15
        metalness: 0.9
        color: "#222233"
    castShadow: true
    receiveShadow: true

  # ── Vehicle 2: Motorcycle ──────────────────────────
  - id: parked-motorcycle
    prompt: futuristic motorcycle with neon accent trim
    style: stylized
    generator: parametric/vehicle
    params:
      vehicle_type: motorcycle
    transform:
      position: [-2, 0, 4]
      rotation: [0, -30, 0]
      scale: 0.9
    material:
      preset: chrome
      pbr:
        roughness: 0.2
        metalness: 0.85
        color: "#111122"
    castShadow: true

  # ── Furniture: Street bench ────────────────────────
  - id: street-bench
    prompt: metal street bench under neon light
    style: stylized
    generator: parametric/furniture
    params:
      type: bench
    transform:
      position: [-4, 0, 3]
      rotation: [0, 90, 0]
    material:
      pbr:
        color: "#333340"
        roughness: 0.6
        metalness: 0.5
    castShadow: true

  # ── Furniture: Vendor stall table ──────────────────
  - id: vendor-table
    prompt: vendor stall table with goods, street market
    style: stylized
    generator: parametric/furniture
    params:
      type: table
      width: 1.5
      depth: 0.8
    transform:
      position: [0, 0, -2]
      rotation: [0, 0, 0]
    material:
      preset: wood
      pbr:
        color: "#4a3525"
        roughness: 0.85
    castShadow: true

  # ── Debris: Dumpster (barrel proxy) ────────────────
  - id: dumpster
    prompt: rusty dumpster in an alley
    style: stylized
    generator: parametric/debris
    params:
      type: barrel
    transform:
      position: [5, 0, -3]
      rotation: [0, 20, 0]
      scale: 1.4
    material:
      preset: rusted-metal
      pbr:
        color: "#3a4a3a"
        roughness: 0.85
        metalness: 0.6
    castShadow: true

  # ── Debris: Crates ─────────────────────────────────
  - id: street-crates
    prompt: stacked supply crates near the vendor
    style: stylized
    generator: parametric/debris
    params:
      type: crate
    transform:
      position: [1.5, 0, -2.5]
    material:
      preset: wood
      pbr:
        color: "#3d2f20"
        roughness: 0.9
    register_prefab: true
    instances:
      - position: [1.5, 0, -2.5]
        rotation: [0, 0, 0]
        scale: 0.8
      - position: [1.8, 0.5, -2.3]
        rotation: [0, 35, 0]
        scale: 0.7
      - position: [1.2, 0, -3.0]
        rotation: [0, -15, 0]
        scale: 0.9
    castShadow: true

  # ── Character: Street vendor ───────────────────────
  - id: street-vendor
    prompt: street vendor figure standing behind the table
    style: stylized
    generator: parametric/character
    params:
      type: human
      pose: standing
    transform:
      position: [0, 0, -2.8]
      rotation: [0, 180, 0]
      scale: 1.0
    material:
      preset: fabric-rough
      pbr:
        color: "#553344"
        roughness: 0.9
    castShadow: true
    receiveShadow: true

  # ── Neon accent objects ────────────────────────────
  # Small neon-glow cubes as accent lights / signage
  - id: neon-sign-pink
    prompt: glowing neon sign, pink
    style: stylized
    generator: parametric/debris
    params:
      type: crate
    transform:
      position: [-6.5, 6, -4.8]
      rotation: [0, 0, 0]
      scale: [1.5, 0.4, 0.1]
    material:
      preset: neon-glow
      pbr:
        color: "#ff1493"

  - id: neon-sign-cyan
    prompt: glowing neon sign, cyan
    style: stylized
    generator: parametric/debris
    params:
      type: crate
    transform:
      position: [6.5, 5, 0.2]
      rotation: [0, 180, 0]
      scale: [1.2, 0.3, 0.1]
    material:
      preset: neon-glow
      pbr:
        color: "#00e5ff"

  - id: neon-sign-yellow
    prompt: glowing neon sign, yellow
    style: stylized
    generator: parametric/debris
    params:
      type: crate
    transform:
      position: [-6.5, 4.5, 5.2]
      rotation: [0, 0, 0]
      scale: [1.0, 0.35, 0.1]
    material:
      preset: neon-glow
      pbr:
        color: "#ffe100"
