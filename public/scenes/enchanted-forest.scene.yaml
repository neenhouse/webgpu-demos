version: "1.0"

meta:
  name: Enchanted Forest
  technique: parametric-stylized
  description: Magical woodland with glowing mushrooms, ancient ruins, dense trees, and dappled forest light
  author: pipeline-showcase

camera:
  position: [10, 7, 16]
  target: [0, 1.5, 0]
  fov: 55
  near: 0.1
  far: 500

environment:
  description: Dense enchanted forest with green-gold dappled light and mystical fog
  background: "#0a1a0a"
  fog:
    type: exponential
    color: "#0d2a10"
    density: 0.035
  ambient:
    color: "#446633"
    intensity: 0.25
  lights:
    - type: directional
      position: [8, 18, 6]
      target: [0, 0, 0]
      color: "#ccaa55"
      intensity: 0.7
      castShadow: true
    - type: point
      position: [-3, 1.5, -2]
      color: "#33ff66"
      intensity: 1.8
      distance: 12
    - type: point
      position: [4, 1.2, 3]
      color: "#44ff88"
      intensity: 1.5
      distance: 10
    - type: point
      position: [-6, 2, 4]
      color: "#22ee55"
      intensity: 1.2
      distance: 10
    - type: point
      position: [2, 1, -5]
      color: "#55ffaa"
      intensity: 1.0
      distance: 8

objects:
  # -- Terrain: Forest floor with leaf litter -------------
  - id: forest-floor
    prompt: forest floor with leaf litter and mossy patches
    style: stylized
    generator: parametric/terrain
    params:
      biome: grassland
      segments: 64
      amplitude: 0.8
      frequency: 0.08
      seed: 42
    transform:
      position: [0, 0, 0]
      scale: [28, 1, 28]
    material:
      preset: earth-dirt
      pbr:
        roughness: 0.95
        color: "#3a2a15"
    receiveShadow: true
    castShadow: false
    lod: auto

  # -- Trees (instanced 7x at various scales) -------------
  - id: forest-tree
    prompt: tall enchanted oak tree with sprawling canopy
    style: stylized
    generator: parametric/vegetation
    params:
      type: tree
      height: 5
      foliageRadius: 2.0
      branchCount: 6
      seed: 11
    transform:
      position: [0, 0, 0]
    material:
      preset: wood-oak
      pbr:
        roughness: 0.85
        color: "#4a3520"
    register_prefab: true
    instances:
      - position: [-7, 0, -6]
        rotation: [0, 0, 0]
        scale: 1.0
      - position: [6, 0, -8]
        rotation: [0, 70, 0]
        scale: 1.3
      - position: [-9, 0, 2]
        rotation: [0, 140, 0]
        scale: 1.1
      - position: [9, 0, 3]
        rotation: [0, 210, 0]
        scale: 0.9
      - position: [-4, 0, 8]
        rotation: [0, 45, 0]
        scale: 1.2
      - position: [3, 0, 10]
        rotation: [0, 300, 0]
        scale: 0.85
      - position: [8, 0, -3]
        rotation: [0, 160, 0]
        scale: 1.15
    castShadow: true
    receiveShadow: true

  # -- Undergrowth bushes (instanced 9x) ------------------
  - id: forest-bush
    prompt: dense forest undergrowth bush
    style: stylized
    generator: parametric/vegetation
    params:
      type: bush
      height: 1.2
      foliageRadius: 0.8
      seed: 22
    transform:
      position: [0, 0, 0]
    material:
      preset: wood-oak
      pbr:
        roughness: 0.8
        color: "#2a5520"
    register_prefab: true
    instances:
      - position: [-2, 0, -3]
        rotation: [0, 0, 0]
        scale: 1.0
      - position: [3, 0, -5]
        rotation: [0, 30, 0]
        scale: 0.8
      - position: [-5, 0, 1]
        rotation: [0, 90, 0]
        scale: 1.1
      - position: [1, 0, 4]
        rotation: [0, 150, 0]
        scale: 0.7
      - position: [-6, 0, -4]
        rotation: [0, 200, 0]
        scale: 0.9
      - position: [5, 0, 6]
        rotation: [0, 260, 0]
        scale: 1.0
      - position: [-3, 0, 6]
        rotation: [0, 45, 0]
        scale: 0.85
      - position: [7, 0, -1]
        rotation: [0, 120, 0]
        scale: 0.75
      - position: [-8, 0, 5]
        rotation: [0, 310, 0]
        scale: 1.05
    castShadow: true

  # -- Giant glowing mushrooms (instanced 6x) -------------
  - id: glow-mushroom
    prompt: giant glowing enchanted mushroom with pulsing bioluminescent cap
    style: stylized
    generator: parametric/organic
    params:
      type: mushroom
      seed: 55
    transform:
      position: [0, 0, 0]
    material:
      preset: organic
      pbr:
        color: "#664488"
        roughness: 0.5
        emissive: "#88ff44"
        emissive_intensity: 1.5
    register_prefab: true
    instances:
      - position: [-3, 0, -1]
        rotation: [0, 0, 0]
        scale: 1.8
      - position: [2, 0, -4]
        rotation: [0, 60, 0]
        scale: 2.2
      - position: [-6, 0, 3]
        rotation: [0, 120, 0]
        scale: 1.5
      - position: [4, 0, 5]
        rotation: [0, 200, 0]
        scale: 2.0
      - position: [-1, 0, 7]
        rotation: [0, 270, 0]
        scale: 1.6
      - position: [6, 0, -6]
        rotation: [0, 330, 0]
        scale: 1.3
    castShadow: true
    animation:
      - property: material.pbr.emissive_intensity
        type: sine
        speed: 0.3
        amplitude: 1.0
        range: [0.5, 2.5]

  # -- Mossy boulders (instanced 5x) ----------------------
  - id: mossy-boulder
    prompt: mossy weathered boulder covered in lichen
    style: stylized
    generator: parametric/rock
    params:
      variant: boulder
      detail: 3
      seed: 33
    transform:
      position: [0, 0, 0]
    material:
      preset: earth-dirt
      pbr:
        color: "#445533"
        roughness: 0.9
        metalness: 0.05
    register_prefab: true
    instances:
      - position: [5, 0, -2]
        rotation: [0, 20, 0]
        scale: 0.9
      - position: [-4, 0, -6]
        rotation: [0, 100, 0]
        scale: 0.7
      - position: [7, 0, 5]
        rotation: [0, 180, 0]
        scale: 1.1
      - position: [-7, 0, -2]
        rotation: [0, 250, 0]
        scale: 0.6
      - position: [1, 0, 9]
        rotation: [0, 60, 0]
        scale: 0.8
    castShadow: true
    receiveShadow: true

  # -- Ancient stone arch (ruin) --------------------------
  - id: stone-arch
    prompt: ancient crumbling stone arch overgrown with moss
    style: stylized
    generator: parametric/building
    params:
      type: ruin
      width: 4
      height: 3.5
      depth: 3
      decay: 0.4
      seed: 77
    transform:
      position: [0, 0, -3]
      rotation: [0, 15, 0]
      scale: 0.8
    material:
      preset: concrete-weathered
      pbr:
        roughness: 0.95
        color: "#6a6a5a"
    castShadow: true
    receiveShadow: true
