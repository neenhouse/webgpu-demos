version: "1.0"

meta:
  name: Abandoned Junkyard
  technique: parametric + CSG + instancing
  description: Post-apocalyptic junkyard with rusted vehicles, debris piles, and scattered rocks
  author: pipeline-showcase

camera:
  position: [12, 8, 18]
  target: [0, 0, 0]
  fov: 55
  near: 0.1
  far: 500

environment:
  description: Overcast junkyard at dusk with grey skies and haze
  background: "#2a2a35"
  fog:
    type: linear
    color: "#2a2a35"
    near: 25
    far: 120
  ambient:
    color: "#8899aa"
    intensity: 0.35
  lights:
    - type: directional
      position: [15, 25, 10]
      target: [0, 0, 0]
      color: "#ccbbaa"
      intensity: 1.0
      castShadow: true
    - type: directional
      position: [-10, 15, -5]
      target: [0, 0, 0]
      color: "#667788"
      intensity: 0.4
    - type: point
      position: [2, 2, 3]
      color: "#ff6600"
      intensity: 1.5
      distance: 12

objects:
  # ── Terrain ──────────────────────────────────────
  - id: ground
    prompt: flat cracked asphalt ground plane with dirt patches
    style: realistic
    generator: parametric/terrain
    params:
      biome: desert
      segments: 64
      amplitude: 0.3
    transform:
      position: [0, 0, 0]
      scale: [30, 1, 30]
    material:
      preset: concrete-weathered
      pbr:
        roughness: 0.95
        color: "#555550"
    receiveShadow: true
    castShadow: false
    lod: auto

  # ── Vehicle 1: Rusted sedan ─────────────────────
  - id: sedan-wreck
    prompt: rusted abandoned sedan with flat tires
    style: realistic
    generator: parametric/vehicle
    params:
      vehicle_type: sedan
      damage: heavy
    transform:
      position: [4, 0, -3]
      rotation: [0, 25, 0]
      scale: 1.2
    material:
      preset: rusted-metal
      pbr:
        roughness: 0.9
        metalness: 0.5
        color: "#7B3F00"
    animation:
      - property: position.y
        type: sine
        speed: 0.2
        amplitude: 0.01
    castShadow: true
    receiveShadow: true
    lod: auto

  # ── Vehicle 2: Pickup truck ─────────────────────
  - id: pickup-wreck
    prompt: abandoned pickup truck with missing hood
    style: realistic
    generator: parametric/vehicle
    params:
      vehicle_type: truck
      damage: moderate
    transform:
      position: [-6, 0, 2]
      rotation: [0, -45, 3]
      scale: 1.3
    material:
      preset: rusted-metal
      pbr:
        roughness: 0.85
        color: "#4a6650"
    castShadow: true
    receiveShadow: true
    lod: auto

  # ── Vehicle 3: Motorcycle ───────────────────────
  - id: motorcycle
    prompt: toppled motorcycle on its side
    style: realistic
    generator: parametric/vehicle
    params:
      vehicle_type: motorcycle
    transform:
      position: [1, 0, 5]
      rotation: [0, 70, 80]
      scale: 0.8
    material:
      preset: rusted-metal
      pbr:
        color: "#333333"
        metalness: 0.7
    castShadow: true

  # ── Debris pile: tires and barrels ──────────────
  - id: tire-pile
    prompt: pile of old tires
    style: realistic
    generator: parametric/debris
    params:
      type: tire
    transform:
      position: [-3, 0, -5]
    material:
      pbr:
        color: "#222222"
        roughness: 0.95
        metalness: 0.0
    register_prefab: true
    instances:
      - position: [-3, 0, -5]
        rotation: [0, 0, 0]
        scale: 1
      - position: [-3.5, 0.4, -4.8]
        rotation: [15, 30, 0]
        scale: 0.9
      - position: [-2.5, 0.3, -5.3]
        rotation: [0, 60, 10]
        scale: 1.1
      - position: [-3.2, 0.8, -5.0]
        rotation: [20, 90, 0]
        scale: 0.85
    castShadow: true

  - id: barrel-stack
    prompt: rusty oil barrels stacked haphazardly
    style: realistic
    generator: parametric/debris
    params:
      type: barrel
    transform:
      position: [7, 0, 1]
    material:
      preset: rusted-metal
      pbr:
        metalness: 0.7
        roughness: 0.8
    animation:
      - property: rotation.y
        type: rotate
        speed: 0.1
    register_prefab: true
    instances:
      - position: [7, 0, 1]
        rotation: [0, 0, 0]
        scale: 1
      - position: [7, 0.9, 1]
        rotation: [0, 45, 0]
        scale: 1
      - position: [7.6, 0, 1.5]
        rotation: [0, 15, 0]
        scale: 1
      - position: [6.5, 0, 0.5]
        rotation: [0, -30, 0]
        scale: 1
      - position: [7.3, 0, 0.3]
        rotation: [90, 0, 20]
        scale: 1

  # ── CSG concrete barriers ──────────────────────
  - id: barrier
    prompt: concrete jersey barrier
    style: realistic
    generator: csg
    params:
      operations:
        - union:
            - box: [2, 0.8, 0.4]
    transform:
      position: [-8, 0, -2]
    material:
      preset: concrete-weathered
      pbr:
        roughness: 0.95
    register_prefab: true
    instances:
      - position: [-8, 0, -2]
        rotation: [0, 0, 0]
        scale: 1
      - position: [-6, 0, -2]
        rotation: [0, 5, 0]
        scale: 1
      - position: [-4, 0, -2.1]
        rotation: [0, -3, 0]
        scale: 1
      - position: [8, 0, -6]
        rotation: [0, 90, 0]
        scale: 1
      - position: [8, 0, -4]
        rotation: [0, 85, 0]
        scale: 1
    castShadow: true

  # ── Scattered rocks ────────────────────────────
  - id: rock-scatter
    prompt: weathered rubble and small boulders
    style: realistic
    generator: parametric/rock
    params:
      variant: rubble
      seed: 77
    transform:
      position: [0, 0, 0]
    material:
      pbr:
        color: "#666660"
        roughness: 0.9
        metalness: 0.05
    register_prefab: true
    instances:
      - position: [2, 0, 7]
        rotation: [0, 0, 0]
        scale: 0.6
      - position: [-5, 0, 6]
        rotation: [0, 45, 0]
        scale: 0.4
      - position: [6, 0, -7]
        rotation: [0, 120, 0]
        scale: 0.8
      - position: [-1, 0, -8]
        rotation: [0, 200, 0]
        scale: 0.5
      - position: [9, 0, 5]
        rotation: [0, 30, 0]
        scale: 0.7
      - position: [-7, 0, -6]
        rotation: [0, 70, 0]
        scale: 0.55
      - position: [3, 0, -6]
        rotation: [10, 150, 0]
        scale: 0.45
      - position: [-9, 0, 4]
        rotation: [0, 260, 0]
        scale: 0.65
    castShadow: true
