version: "1.0"

meta:
  name: Desert Outpost
  technique: parametric-pbr
  description: Remote desert camp with an outpost building, rock formations, scrub vegetation, and supply crates
  author: pipeline-showcase

camera:
  position: [14, 8, 16]
  target: [0, 0, 0]
  fov: 55
  near: 0.1
  far: 500

environment:
  description: Harsh desert midday with warm sunlight, sandy haze, and clear sky
  background: "#c8a870"
  fog:
    type: linear
    color: "#d4b87a"
    near: 30
    far: 120
  ambient:
    color: "#e8c090"
    intensity: 0.5
  lights:
    # Harsh overhead sun
    - type: directional
      position: [8, 30, 5]
      target: [0, 0, 0]
      color: "#fff5e0"
      intensity: 1.6
      castShadow: true
    # Warm fill from opposite side
    - type: directional
      position: [-10, 15, -8]
      target: [0, 0, 0]
      color: "#e8a050"
      intensity: 0.35
    # Ground bounce light
    - type: point
      position: [0, 1, 0]
      color: "#d4a060"
      intensity: 0.6
      distance: 20

objects:
  # ── Terrain: Sandy desert ground ───────────────────
  - id: desert-ground
    prompt: flat sandy desert ground with scattered pebbles and dune ripples
    style: realistic
    generator: parametric/terrain
    params:
      biome: desert
      segments: 64
      amplitude: 0.5
    transform:
      position: [0, 0, 0]
      scale: [40, 1, 40]
    material:
      preset: earth-dirt
      pbr:
        roughness: 0.95
        color: "#c4a060"
    receiveShadow: true
    castShadow: false
    lod: auto

  # ── Building: Small outpost structure ──────────────
  - id: outpost-building
    prompt: small desert outpost structure with flat roof and door
    style: realistic
    generator: parametric/building
    params:
      type: house
      width: 5
      depth: 4
      height: 3.5
      roofType: flat
    transform:
      position: [0, 0, -4]
      rotation: [0, 15, 0]
    material:
      preset: concrete-weathered
      pbr:
        roughness: 0.9
        color: "#b89870"
    castShadow: true
    receiveShadow: true
    lod: auto

  # ── Rocks: Desert rock formations ──────────────────
  - id: desert-boulders
    prompt: weathered desert boulders and rock formations
    style: realistic
    generator: parametric/rock
    params:
      variant: boulder
      seed: 42
    transform:
      position: [0, 0, 0]
    material:
      pbr:
        color: "#9a7a55"
        roughness: 0.92
        metalness: 0.05
    register_prefab: true
    instances:
      - position: [8, 0, -6]
        rotation: [0, 0, 0]
        scale: 1.2
      - position: [10, 0, -3]
        rotation: [0, 45, 0]
        scale: 0.8
      - position: [-9, 0, -7]
        rotation: [0, 120, 0]
        scale: 1.5
      - position: [-11, 0, -4]
        rotation: [0, 200, 0]
        scale: 0.7
    castShadow: true
    receiveShadow: true

  - id: desert-jagged-rocks
    prompt: jagged desert rock spires
    style: realistic
    generator: parametric/rock
    params:
      variant: jagged
      seed: 99
    transform:
      position: [0, 0, 0]
    material:
      pbr:
        color: "#8a6a45"
        roughness: 0.88
        metalness: 0.08
    register_prefab: true
    instances:
      - position: [12, 0, 2]
        rotation: [0, 30, 0]
        scale: 1.0
      - position: [-12, 0, 5]
        rotation: [0, 160, 0]
        scale: 1.3
      - position: [6, 0, 10]
        rotation: [0, 70, 0]
        scale: 0.9
      - position: [-5, 0, 12]
        rotation: [0, 240, 0]
        scale: 1.1
    castShadow: true
    receiveShadow: true

  # ── Vegetation: Scrub bushes ───────────────────────
  - id: scrub-bushes
    prompt: sparse desert scrub bushes, dry and weathered
    style: realistic
    generator: parametric/vegetation
    params:
      type: bush
      height: 0.8
      foliageRadius: 0.6
      foliageDensity: 5
    transform:
      position: [0, 0, 0]
    material:
      preset: organic
      pbr:
        color: "#6a7a40"
        roughness: 0.9
    animation:
      - property: rotation.z
        type: sway
        speed: 0.4
        amplitude: 0.05
    register_prefab: true
    instances:
      - position: [4, 0, 6]
        rotation: [0, 0, 0]
        scale: 0.9
      - position: [-6, 0, 3]
        rotation: [0, 55, 0]
        scale: 1.1
      - position: [7, 0, -1]
        rotation: [0, 120, 0]
        scale: 0.7
      - position: [-3, 0, 8]
        rotation: [0, 200, 0]
        scale: 1.0
      - position: [11, 0, 7]
        rotation: [0, 80, 0]
        scale: 0.8
    castShadow: true

  # ── Vehicle: Old truck ─────────────────────────────
  - id: old-truck
    prompt: weathered old pickup truck parked at the outpost
    style: realistic
    generator: parametric/vehicle
    params:
      vehicle_type: truck
      damage: moderate
    transform:
      position: [5, 0, -2]
      rotation: [0, -35, 0]
      scale: 1.2
    material:
      preset: rusted-metal
      pbr:
        roughness: 0.85
        metalness: 0.5
        color: "#7a5533"
    castShadow: true
    receiveShadow: true
    lod: auto

  # ── Furniture: Camp table and bench ────────────────
  - id: camp-table
    prompt: rough wooden camp table
    style: realistic
    generator: parametric/furniture
    params:
      type: table
      width: 1.4
      depth: 0.7
    transform:
      position: [-3, 0, -2]
      rotation: [0, 10, 0]
    material:
      preset: wood
      pbr:
        color: "#6a5030"
        roughness: 0.9
    castShadow: true

  - id: camp-bench
    prompt: rough wooden camp bench near the table
    style: realistic
    generator: parametric/furniture
    params:
      type: bench
    transform:
      position: [-3, 0, -1]
      rotation: [0, 10, 0]
    material:
      preset: wood
      pbr:
        color: "#5a4528"
        roughness: 0.92
    castShadow: true

  # ── Debris: Supply crates and barrels ──────────────
  - id: supply-crates
    prompt: supply crates stacked near the outpost
    style: realistic
    generator: parametric/debris
    params:
      type: crate
    transform:
      position: [2, 0, -5]
    material:
      preset: wood
      pbr:
        color: "#7a6040"
        roughness: 0.88
    register_prefab: true
    instances:
      - position: [2, 0, -5]
        rotation: [0, 0, 0]
        scale: 1.0
      - position: [2.5, 0.55, -5.2]
        rotation: [0, 25, 0]
        scale: 0.85
      - position: [1.5, 0, -5.7]
        rotation: [0, -10, 0]
        scale: 0.95
    castShadow: true

  - id: supply-barrels
    prompt: metal supply barrels at the outpost
    style: realistic
    generator: parametric/debris
    params:
      type: barrel
    transform:
      position: [-1, 0, -5.5]
    material:
      preset: rusted-metal
      pbr:
        roughness: 0.82
        metalness: 0.6
        color: "#556050"
    register_prefab: true
    instances:
      - position: [-1, 0, -5.5]
        rotation: [0, 0, 0]
        scale: 1.0
      - position: [-1.5, 0, -5.2]
        rotation: [0, 30, 0]
        scale: 1.0
      - position: [-1, 0.9, -5.4]
        rotation: [0, 60, 0]
        scale: 1.0
    castShadow: true

  # ── Weapon: Mounted staff / flag pole ──────────────
  - id: flag-pole
    prompt: tall staff or flag pole planted near the outpost entrance
    style: realistic
    generator: parametric/weapon
    params:
      type: staff
      handleLength: 2.5
      handleRadius: 0.03
    transform:
      position: [1, 0, -2.5]
      rotation: [0, 0, 0]
      scale: 1.2
    material:
      preset: wood
      pbr:
        color: "#5a4020"
        roughness: 0.85
    animation:
      - property: rotation.z
        type: sway
        speed: 0.8
        amplitude: 0.15
    castShadow: true
