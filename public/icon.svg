<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="50%" stop-color="#8844ff"/>
      <stop offset="100%" stop-color="#ff44aa"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#00ddff"/>
    </linearGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="24" cy="24" r="22" fill="url(#glow)"/>
  <!-- Main hexagonal crystal shape -->
  <polygon points="24,2 42,13 42,35 24,46 6,35 6,13" fill="url(#crystal)" opacity="0.9"/>
  <!-- Inner facet - top -->
  <polygon points="24,2 42,13 24,20 6,13" fill="url(#inner)" opacity="0.6"/>
  <!-- Inner facet - left -->
  <polygon points="6,13 24,20 24,46 6,35" fill="#4422aa" opacity="0.5"/>
  <!-- Inner facet - right -->
  <polygon points="42,13 42,35 24,46 24,20" fill="#6633cc" opacity="0.4"/>
  <!-- Center bright point -->
  <circle cx="24" cy="20" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="24" cy="20" r="2" fill="#ffffff"/>
  <!-- GPU grid lines -->
  <line x1="15" y1="16" x2="15" y2="40" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="20" x2="24" y2="46" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="33" y1="16" x2="33" y2="40" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="6" y1="24" x2="42" y2="24" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="6" y1="32" x2="42" y2="32" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
</svg>
